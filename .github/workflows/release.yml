name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build macOS binaries
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: |
          swift build -c release --disable-sandbox

      - name: Prepare Metal kernels
        run: |
          .build/release/mlx-server --prepare-metal

      - name: Package binaries
        run: |
          mkdir -p dist
          cp .build/release/mlx-server dist/
          cp .build/release/mlx-coder dist/

          SERVER_BIN=$(python3 - <<'PY'
          import os
          print(os.path.realpath(".build/release/mlx-server"))
          PY
          )
          SERVER_DIR=$(dirname "$SERVER_BIN")
          cp "$SERVER_DIR/mlx.metallib" dist/
          if [ -f "$SERVER_DIR/mlx.metallib.manifest.json" ]; then
            cp "$SERVER_DIR/mlx.metallib.manifest.json" dist/
          fi

          # Install features into dist/features/
          mkdir -p dist/features
          for feature in mlx-search-tools-feature mlx-web-tools-feature mlx-git-tools-feature mlx-xcode-tools-feature mlx-figma-tools-feature mlx-jira-tools-feature; do
            if [ -f ".build/release/$feature" ]; then
              cp ".build/release/$feature" dist/features/
            fi
          done

          # Create archive
          cd dist
          tar czf mlx-server-${{ github.ref_name }}-macos-arm64.tar.gz \
            mlx-server mlx-coder \
            mlx.metallib mlx.metallib.manifest.json \
            features/
          cd ..

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 mlx-server-${{ github.ref_name }}-macos-arm64.tar.gz \
            > mlx-server-${{ github.ref_name }}-macos-arm64.tar.gz.sha256

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/mlx-server-${{ github.ref_name }}-macos-arm64.tar.gz
            dist/mlx-server-${{ github.ref_name }}-macos-arm64.tar.gz.sha256

      - name: Notify Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not configured; homebrew-tap will update from its scheduled workflow."
            exit 0
          fi

          VERSION="${RELEASE_TAG#v}"
          PAYLOAD=$(printf '{"event_type":"release","client_payload":{"version":"%s"}}' "$VERSION")
          RESPONSE_BODY="$(mktemp)"
          HTTP_STATUS=$(
            curl --silent --show-error --location \
              --output "$RESPONSE_BODY" \
              --write-out "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/gerardogrisolini/homebrew-tap/dispatches \
              -d "$PAYLOAD"
          )

          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Failed to dispatch homebrew-tap update. HTTP status: ${HTTP_STATUS}"
            cat "$RESPONSE_BODY"
            exit 1
          fi

          echo "Dispatched homebrew-tap update for v${VERSION}."
